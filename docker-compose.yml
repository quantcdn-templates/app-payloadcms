services:
  app:
    build:
      context: .
      args:
        NODE_VERSION: "22"
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PAYLOAD_SECRET=${PAYLOAD_SECRET:-replace-me-with-a-random-string}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-payload}
      - DB_USERNAME=${DB_USERNAME:-payload}
      - DB_PASSWORD=${DB_PASSWORD:-payload}
    volumes:
      - payload-media:/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/ || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    labels:
      quant.type: postgres
    environment:
      - POSTGRES_DB=${DB_DATABASE:-payload}
      - POSTGRES_USER=${DB_USERNAME:-payload}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-payload}
    volumes:
      - payload-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-payload} -d ${DB_DATABASE:-payload}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  payload-media:
  payload-db-data:
